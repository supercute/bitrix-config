name: Tests

on:
    push:
        branches: [main]
    pull_request:

jobs:
    phpunit:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.0"

            - uses: ramsey/composer-install@v4

            - run: composer test
